name: Daily Health Tips

# Sends the day's health tip to all active subscribers by pinging the platform's
# run-daily endpoint. Runs once a day; the endpoint is idempotent (it won't
# double-send the same day if this also fires manually).
on:
  schedule:
    # 07:00 UTC = 08:00 WAT (West Africa Time). Adjust the time as you like.
    - cron: '0 7 * * *'
  workflow_dispatch: {}   # lets you trigger it by hand from the Actions tab

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily tip send
        env:
          # API_BASE_URL is optional; defaults to the Render API host.
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CRON_SECRET: ${{ secrets.HEALTH_TIPS_CRON_SECRET }}
        run: |
          set -euo pipefail
          BASE="${API_BASE_URL:-https://api.mobicovahealth.com}"
          URL="$BASE/api/v1/health-tips/run-daily"
          echo "POST $URL"
          # --retry handles Render cold-starts (a sleeping service returns 502
          # until it wakes); --max-time caps each attempt.
          curl -fsS -X POST "$URL" \
            -H "x-cron-secret: $CRON_SECRET" \
            --retry 5 --retry-delay 20 --retry-all-errors --max-time 60
          echo ""
          echo "Done."
