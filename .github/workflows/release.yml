name: Production release (managed — Path A)

# Active production pipeline. A semver tag (e.g. v1.4.0) promotes the release to
# MANAGED production (Render + Supabase), behind a manual approval gate.
#
# Promotion path:  PR/push to main → UAT (uat.yml)  →  tag vX.Y → production (this)
#
# Required repo configuration
#   Secrets:
#     RENDER_DEPLOY_HOOK_PROD_API   deploy hook for the prod API service
#     RENDER_DEPLOY_HOOK_PROD_WEB   deploy hook for the prod web (static) service
#   Variables:
#     PROD_API_URL                  e.g. https://api.yourdomain  (smoke test)

on:
  push:
    tags: ["v*.*.*"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
      - name: Install, smoke-test & build server
        working-directory: server
        run: npm ci && npm test && npm run build
      - name: Build & type-check client
        working-directory: client
        run: npm ci && npm run build

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment: production        # set required reviewers for the manual approval gate
    steps:
      - name: Trigger Render production API deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_PROD_API }}
        run: curl -fsS -X POST "$HOOK"
      - name: Trigger Render production web deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_PROD_WEB }}
        run: curl -fsS -X POST "$HOOK"
      - name: Smoke test & migration-sync gate
        run: |
          API="${{ vars.PROD_API_URL }}"
          EXPECTED="${{ github.sha }}"
          echo "Waiting for $API to come up on commit ${EXPECTED:0:12}…"
          for i in $(seq 1 30); do
            body=$(curl -s "$API/health" || true)
            code=$(curl -s -o /dev/null -w "%{http_code}" "$API/health" || true)
            ver=$(echo "$body" | jq -r '.version // ""' 2>/dev/null || echo "")
            echo "attempt $i: http=$code version=${ver:0:12}"
            if [ "$code" = "200" ]; then
              # If the app reports its commit, wait until it's the one we deployed
              # (skips the old version still serving during the zero-downtime swap).
              if [ -z "$ver" ] || [ "$ver" = "$EXPECTED" ]; then
                ok=$(echo "$body" | jq -r '.migrations.ok // "unknown"')
                pending=$(echo "$body" | jq -r '(.migrations.pending // []) | join(", ")')
                echo "migrations.ok=$ok pending=[$pending]"
                if [ "$ok" = "false" ]; then
                  echo "::error::Pending migration(s) not applied to the database: $pending"
                  echo "Apply the matching paste editions in Supabase (server/src/db/sql/), then re-run."
                  exit 1
                fi
                echo "✓ Live on the deployed commit and database schema in sync."
                exit 0
              fi
            fi
            sleep 10
          done
          echo "::error::Service did not come up on the expected commit in time."; exit 1
