<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t1 d1">
  <title id="t1">MobiCova Health target production architecture</title>
  <desc id="d1">Request path from channels through Cloudflare edge, load balancer, redundant API nodes and job workers, Redis, to a high-availability Postgres cluster, with external integrations and object storage.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7A8A8A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .bg{fill:#ffffff;stroke:#E3EAEA}
    .th{font:500 14px 'Segoe UI',Arial,sans-serif;fill:#16302F}
    .ts{font:400 11.5px 'Segoe UI',Arial,sans-serif;fill:#5E6E6E}
    .lg{font:400 11px 'Segoe UI',Arial,sans-serif;fill:#5E6E6E}
    .arr{fill:none;stroke:#7A8A8A;stroke-width:1.6}
    .dash{fill:none;stroke:#9AA8A8;stroke-width:1.3;stroke-dasharray:5 3}
    .n-gray{fill:#EEF1F1;stroke:#5B6B6B;stroke-width:1.3}
    .n-blue{fill:#E7EEF7;stroke:#2F6FB0;stroke-width:1.3}
    .n-teal{fill:#E2F1F0;stroke:#0A7B7B;stroke-width:1.3}
    .n-amber{fill:#F7EFDD;stroke:#BD8B2C;stroke-width:1.3}
    .n-green{fill:#E7F2E9;stroke:#3E8E5A;stroke-width:1.3}
  </style>
  <rect class="bg" x="4" y="4" width="992" height="592" rx="14"/>

  <!-- arrows first (under boxes) -->
  <line class="arr" x1="160" y1="80" x2="250" y2="108" marker-end="url(#arrow)"/>
  <line class="arr" x1="320" y1="80" x2="350" y2="108" marker-end="url(#arrow)"/>
  <line class="arr" x1="480" y1="80" x2="470" y2="108" marker-end="url(#arrow)"/>
  <line class="arr" x1="640" y1="80" x2="560" y2="108" marker-end="url(#arrow)"/>
  <line class="arr" x1="400" y1="164" x2="400" y2="194" marker-end="url(#arrow)"/>
  <line class="arr" x1="395" y1="250" x2="212" y2="280" marker-end="url(#arrow)"/>
  <line class="arr" x1="400" y1="250" x2="400" y2="280" marker-end="url(#arrow)"/>
  <line class="arr" x1="205" y1="336" x2="358" y2="366" marker-end="url(#arrow)"/>
  <line class="arr" x1="400" y1="336" x2="400" y2="366" marker-end="url(#arrow)"/>
  <line class="arr" x1="495" y1="392" x2="572" y2="338" marker-end="url(#arrow)"/>
  <line class="arr" x1="358" y1="422" x2="208" y2="452" marker-end="url(#arrow)"/>
  <line class="dash" x1="280" y1="481" x2="318" y2="481" marker-end="url(#arrow)"/>
  <line class="dash" x1="460" y1="481" x2="498" y2="481" marker-end="url(#arrow)"/>
  <line class="dash" x1="680" y1="306" x2="818" y2="312" marker-end="url(#arrow)"/>
  <line class="dash" x1="680" y1="330" x2="818" y2="400" marker-end="url(#arrow)"/>
  <text class="ts" x="389" y="446" text-anchor="middle">auto-failover</text>

  <!-- channels -->
  <g><rect class="n-gray" x="90"  y="36" width="140" height="44" rx="8"/><text class="th" x="160" y="63" text-anchor="middle">Web / app</text></g>
  <g><rect class="n-gray" x="250" y="36" width="140" height="44" rx="8"/><text class="th" x="320" y="63" text-anchor="middle">WhatsApp</text></g>
  <g><rect class="n-gray" x="410" y="36" width="140" height="44" rx="8"/><text class="th" x="480" y="63" text-anchor="middle">USSD</text></g>
  <g><rect class="n-gray" x="570" y="36" width="140" height="44" rx="8"/><text class="th" x="640" y="63" text-anchor="middle">SMS / OTP</text></g>

  <!-- edge -->
  <g><rect class="n-blue" x="160" y="110" width="480" height="54" rx="9"/>
     <text class="th" x="400" y="133" text-anchor="middle">Cloudflare edge</text>
     <text class="ts" x="400" y="151" text-anchor="middle">CDN · WAF · DDoS · Lagos PoP</text></g>

  <!-- load balancer -->
  <g><rect class="n-blue" x="305" y="194" width="190" height="54" rx="9"/>
     <text class="th" x="400" y="217" text-anchor="middle">Load balancer</text>
     <text class="ts" x="400" y="235" text-anchor="middle">health checks · autoscale</text></g>

  <!-- app tier -->
  <g><rect class="n-blue" x="120" y="280" width="160" height="56" rx="9"/>
     <text class="th" x="200" y="305" text-anchor="middle">API node</text>
     <text class="ts" x="200" y="323" text-anchor="middle">zone A</text></g>
  <g><rect class="n-blue" x="320" y="280" width="160" height="56" rx="9"/>
     <text class="th" x="400" y="305" text-anchor="middle">API node</text>
     <text class="ts" x="400" y="323" text-anchor="middle">zone B</text></g>
  <g><rect class="n-amber" x="520" y="280" width="160" height="56" rx="9"/>
     <text class="th" x="600" y="305" text-anchor="middle">Job workers</text>
     <text class="ts" x="600" y="323" text-anchor="middle">emails · webhooks</text></g>

  <!-- redis -->
  <g><rect class="n-amber" x="305" y="366" width="190" height="56" rx="9"/>
     <text class="th" x="400" y="391" text-anchor="middle">Redis</text>
     <text class="ts" x="400" y="409" text-anchor="middle">cache · queue · rate-limit</text></g>

  <!-- data tier -->
  <g><rect class="n-teal" x="120" y="452" width="160" height="56" rx="9"/>
     <text class="th" x="200" y="477" text-anchor="middle">Postgres primary</text>
     <text class="ts" x="200" y="495" text-anchor="middle">zone A</text></g>
  <g><rect class="n-teal" x="320" y="452" width="140" height="56" rx="9"/>
     <text class="th" x="390" y="477" text-anchor="middle">Standby</text>
     <text class="ts" x="390" y="495" text-anchor="middle">zone B</text></g>
  <g><rect class="n-teal" x="500" y="452" width="150" height="56" rx="9"/>
     <text class="th" x="575" y="477" text-anchor="middle">Read replica</text>
     <text class="ts" x="575" y="495" text-anchor="middle">reporting</text></g>

  <!-- right rail: integrations + storage -->
  <g><rect class="n-green" x="820" y="280" width="160" height="80" rx="9"/>
     <text class="th" x="900" y="306" text-anchor="middle">Integrations</text>
     <text class="ts" x="900" y="325" text-anchor="middle">Claude · payments</text>
     <text class="ts" x="900" y="342" text-anchor="middle">email · SMS gateways</text></g>
  <g><rect class="n-green" x="820" y="384" width="160" height="52" rx="9"/>
     <text class="th" x="900" y="406" text-anchor="middle">Object storage</text>
     <text class="ts" x="900" y="424" text-anchor="middle">files · claim docs</text></g>

  <!-- legend -->
  <rect x="120" y="551" width="12" height="12" rx="3" class="n-gray"/><text class="lg" x="138" y="561">channels</text>
  <rect x="230" y="551" width="12" height="12" rx="3" class="n-blue"/><text class="lg" x="248" y="561">edge / compute</text>
  <rect x="380" y="551" width="12" height="12" rx="3" class="n-amber"/><text class="lg" x="398" y="561">queue / workers</text>
  <rect x="535" y="551" width="12" height="12" rx="3" class="n-teal"/><text class="lg" x="553" y="561">data</text>
  <rect x="610" y="551" width="12" height="12" rx="3" class="n-green"/><text class="lg" x="628" y="561">external</text>
  <text class="lg" x="720" y="561">— — replication / failover</text>
</svg>
