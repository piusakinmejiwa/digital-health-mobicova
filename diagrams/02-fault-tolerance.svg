<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t2 d2">
  <title id="t2">MobiCova Health fault tolerance and failover</title>
  <desc id="d2">Load balancer spreads traffic across two availability zones, each with a redundant API node and a Postgres instance; the standby auto-fails-over from the primary, backed by point-in-time backups, observability and rehearsed restore.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7A8A8A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .bg{fill:#ffffff;stroke:#E3EAEA}
    .th{font:500 14px 'Segoe UI',Arial,sans-serif;fill:#16302F}
    .ts{font:400 11.5px 'Segoe UI',Arial,sans-serif;fill:#5E6E6E}
    .zone{fill:#F4F8F8;stroke:#CBD9D9;stroke-width:1.2}
    .zlbl{font:500 12px 'Segoe UI',Arial,sans-serif;fill:#0A7B7B}
    .arr{fill:none;stroke:#7A8A8A;stroke-width:1.6}
    .dash{fill:none;stroke:#0A7B7B;stroke-width:1.5;stroke-dasharray:5 3}
    .n-gray{fill:#EEF1F1;stroke:#5B6B6B;stroke-width:1.3}
    .n-blue{fill:#E7EEF7;stroke:#2F6FB0;stroke-width:1.3}
    .n-teal{fill:#E2F1F0;stroke:#0A7B7B;stroke-width:1.3}
    .n-green{fill:#E7F2E9;stroke:#3E8E5A;stroke-width:1.3}
  </style>
  <rect class="bg" x="4" y="4" width="892" height="532" rx="14"/>

  <!-- zones -->
  <rect class="zone" x="50"  y="168" width="370" height="248" rx="12"/>
  <rect class="zone" x="480" y="168" width="370" height="248" rx="12"/>
  <text class="zlbl" x="70"  y="192">Availability zone A</text>
  <text class="zlbl" x="500" y="192">Availability zone B</text>

  <!-- arrows -->
  <line class="arr" x1="420" y1="146" x2="240" y2="210" marker-end="url(#arrow)"/>
  <line class="arr" x1="480" y1="146" x2="660" y2="210" marker-end="url(#arrow)"/>
  <line class="arr" x1="235" y1="262" x2="235" y2="298" marker-end="url(#arrow)"/>
  <line class="arr" x1="640" y1="262" x2="378" y2="326" marker-end="url(#arrow)"/>
  <line class="dash" x1="375" y1="330" x2="525" y2="330"/>
  <line class="dash" x1="525" y1="340" x2="375" y2="340"/>

  <!-- top -->
  <g><rect class="n-gray" x="370" y="28" width="160" height="44" rx="8"/><text class="th" x="450" y="55" text-anchor="middle">Member traffic</text></g>
  <g><rect class="n-blue" x="350" y="96" width="200" height="50" rx="9"/>
     <text class="th" x="450" y="118" text-anchor="middle">Load balancer</text>
     <text class="ts" x="450" y="135" text-anchor="middle">multi-AZ · health checks</text></g>

  <!-- zone A inner -->
  <g><rect class="n-blue" x="95" y="210" width="280" height="52" rx="9"/>
     <text class="th" x="235" y="232" text-anchor="middle">API node</text>
     <text class="ts" x="235" y="250" text-anchor="middle">auto-replaced if unhealthy</text></g>
  <g><rect class="n-teal" x="95" y="300" width="280" height="58" rx="9"/>
     <text class="th" x="235" y="325" text-anchor="middle">Postgres primary</text>
     <text class="ts" x="235" y="343" text-anchor="middle">reads + writes</text></g>

  <!-- zone B inner -->
  <g><rect class="n-blue" x="525" y="210" width="280" height="52" rx="9"/>
     <text class="th" x="665" y="232" text-anchor="middle">API node</text>
     <text class="ts" x="665" y="250" text-anchor="middle">auto-replaced if unhealthy</text></g>
  <g><rect class="n-teal" x="525" y="300" width="280" height="58" rx="9"/>
     <text class="th" x="665" y="325" text-anchor="middle">Postgres standby</text>
     <text class="ts" x="665" y="343" text-anchor="middle">synchronous replica</text></g>

  <text class="ts" x="450" y="376" text-anchor="middle">automatic failover · promotes standby on primary loss</text>

  <!-- cross-cutting footer -->
  <g><rect class="n-green" x="70"  y="440" width="240" height="62" rx="9"/>
     <text class="th" x="190" y="466" text-anchor="middle">PITR backups</text>
     <text class="ts" x="190" y="484" text-anchor="middle">RPO ≤ 5 min · daily snapshots</text></g>
  <g><rect class="n-green" x="330" y="440" width="240" height="62" rx="9"/>
     <text class="th" x="450" y="466" text-anchor="middle">Observability + alerts</text>
     <text class="ts" x="450" y="484" text-anchor="middle">p95 · errors · on-call</text></g>
  <g><rect class="n-green" x="590" y="440" width="240" height="62" rx="9"/>
     <text class="th" x="710" y="466" text-anchor="middle">Rehearsed restore</text>
     <text class="ts" x="710" y="484" text-anchor="middle">RTO ≤ 30 min · game-day</text></g>
</svg>
