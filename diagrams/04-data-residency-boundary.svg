<svg viewBox="0 0 920 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t4 d4">
  <title id="t4">MobiCova Health data residency and network boundary</title>
  <desc id="d4">Public traffic enters through Cloudflare TLS and WAF into the AWS af-south-1 trust boundary, where compute, encrypted data stores holding member PII, and security controls live; external sub-processors receive data-minimised traffic over TLS outside the boundary.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7A8A8A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .bg{fill:#ffffff;stroke:#E3EAEA}
    .th{font:500 13.5px 'Segoe UI',Arial,sans-serif;fill:#16302F}
    .ts{font:400 11px 'Segoe UI',Arial,sans-serif;fill:#5E6E6E}
    .zlbl{font:500 12px 'Segoe UI',Arial,sans-serif;fill:#0A7B7B}
    .note{font:400 11px 'Segoe UI',Arial,sans-serif;fill:#5E6E6E}
    .arr{fill:none;stroke:#7A8A8A;stroke-width:1.6}
    .dash{fill:none;stroke:#9AA8A8;stroke-width:1.4;stroke-dasharray:5 3}
    .boundary{fill:#F4FAFA;stroke:#0A7B7B;stroke-width:1.8;stroke-dasharray:7 4}
    .data{fill:#EAF5F4;stroke:#0A7B7B;stroke-width:1.2}
    .n-gray{fill:#EEF1F1;stroke:#5B6B6B;stroke-width:1.3}
    .n-blue{fill:#E7EEF7;stroke:#2F6FB0;stroke-width:1.3}
    .n-teal{fill:#DCEFEC;stroke:#0A7B7B;stroke-width:1.3}
    .n-amber{fill:#F7EFDD;stroke:#BD8B2C;stroke-width:1.3}
    .n-green{fill:#E7F2E9;stroke:#3E8E5A;stroke-width:1.3}
  </style>
  <rect class="bg" x="4" y="4" width="912" height="592" rx="14"/>

  <!-- public internet -->
  <text class="zlbl" x="40" y="30">Public internet (untrusted)</text>
  <g><rect class="n-gray" x="40"  y="40" width="240" height="44" rx="8"/><text class="th" x="160" y="67" text-anchor="middle">Members &amp; channels</text></g>
  <g><rect class="n-gray" x="300" y="40" width="180" height="44" rx="8"/><text class="th" x="390" y="67" text-anchor="middle">Partner admins</text></g>

  <!-- edge -->
  <g><rect class="n-blue" x="40" y="104" width="440" height="50" rx="9"/>
     <text class="th" x="260" y="126" text-anchor="middle">Cloudflare edge</text>
     <text class="ts" x="260" y="143" text-anchor="middle">TLS termination · WAF · DDoS</text></g>
  <line class="arr" x1="160" y1="84" x2="200" y2="104" marker-end="url(#arrow)"/>
  <line class="arr" x1="390" y1="84" x2="320" y2="104" marker-end="url(#arrow)"/>
  <line class="arr" x1="260" y1="154" x2="260" y2="196" marker-end="url(#arrow)"/>

  <!-- trust boundary -->
  <rect class="boundary" x="40" y="196" width="840" height="312" rx="14"/>
  <text class="zlbl" x="60" y="220">AWS af-south-1 (Cape Town) — data-residency &amp; encryption-at-rest boundary</text>

  <!-- compute column -->
  <g><rect class="n-blue" x="70"  y="236" width="230" height="44" rx="8"/><text class="th" x="185" y="263" text-anchor="middle">Load balancer (ALB)</text></g>
  <g><rect class="n-blue" x="70"  y="296" width="230" height="44" rx="8"/><text class="th" x="185" y="323" text-anchor="middle">API nodes (private)</text></g>
  <g><rect class="n-amber" x="70" y="356" width="230" height="44" rx="8"/><text class="th" x="185" y="383" text-anchor="middle">Job workers</text></g>

  <!-- data sub-box -->
  <rect class="data" x="340" y="232" width="290" height="220" rx="11"/>
  <text class="zlbl" x="356" y="252">Data · member PII · encrypted (KMS)</text>
  <g><rect class="n-teal" x="360" y="262" width="250" height="50" rx="8"/>
     <text class="th" x="485" y="284" text-anchor="middle">Postgres primary + standby</text>
     <text class="ts" x="485" y="300" text-anchor="middle">encrypted at rest</text></g>
  <g><rect class="n-teal" x="360" y="324" width="250" height="42" rx="8"/><text class="th" x="485" y="350" text-anchor="middle">Redis (cache / queue)</text></g>
  <g><rect class="n-teal" x="360" y="378" width="250" height="50" rx="8"/>
     <text class="th" x="485" y="400" text-anchor="middle">Object storage</text>
     <text class="ts" x="485" y="416" text-anchor="middle">encrypted · private</text></g>

  <!-- controls column -->
  <g><rect class="n-green" x="668" y="236" width="182" height="216" rx="10"/>
     <text class="th" x="759" y="262" text-anchor="middle">Security controls</text>
     <text class="ts" x="759" y="290" text-anchor="middle">Secrets mgr (KMS)</text>
     <text class="ts" x="759" y="312" text-anchor="middle">Append-only audit log</text>
     <text class="ts" x="759" y="334" text-anchor="middle">IAM least-privilege</text>
     <text class="ts" x="759" y="356" text-anchor="middle">Private subnets</text>
     <text class="ts" x="759" y="378" text-anchor="middle">VPC flow logs</text></g>

  <!-- internal arrows -->
  <line class="arr" x1="185" y1="280" x2="185" y2="296" marker-end="url(#arrow)"/>
  <line class="arr" x1="185" y1="340" x2="185" y2="356" marker-end="url(#arrow)"/>
  <line class="arr" x1="300" y1="318" x2="358" y2="300" marker-end="url(#arrow)"/>
  <line class="arr" x1="300" y1="372" x2="358" y2="396" marker-end="url(#arrow)"/>

  <!-- egress to sub-processors -->
  <line class="dash" x1="185" y1="400" x2="185" y2="544" marker-end="url(#arrow)"/>
  <g><rect class="n-gray" x="40" y="546" width="560" height="44" rx="8"/>
     <text class="th" x="320" y="573" text-anchor="middle">External sub-processors — WhatsApp · Paystack/Stripe · Anthropic · Resend</text></g>
  <text class="note" x="210" y="470" >egress: TLS · data-minimised</text>
  <text class="note" x="620" y="573">PII stays inside the boundary</text>
</svg>
