services:
  # Express API
  - type: web
    name: mobicova-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Render skips devDependencies when NODE_ENV=production; keep them for the tsc build.
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      # Prefer IPv4 for outbound DNS — IPv6 egress drops cause "Premature close"
      # errors when calling api.anthropic.com from this host.
      - key: NODE_OPTIONS
        value: "--dns-result-order=ipv4first"
      - key: JWT_SECRET
        generateValue: true
      # Set these in the Render dashboard (Environment tab) — not stored in the repo.
      - key: DATABASE_URL
        sync: false
      # Optional — PEM CA cert to verify the DB TLS certificate (MITM defence).
      - key: DATABASE_CA_CERT
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      # Live WhatsApp intake (Meta Cloud API) — simulators work without these.
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      # Comma-separated emails granted platform-admin access to the catalog Admin UI.
      - key: PLATFORM_ADMIN_EMAILS
        sync: false

  # React (Vite) static client
  - type: web
    name: mobicova-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      # SPA fallback so react-router deep links / refreshes resolve to index.html
      - type: rewrite
        source: /*
        destination: /index.html
